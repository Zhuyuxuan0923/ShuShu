env {
  parallelism = 1
  job.mode = "BATCH"
  checkpoint.interval = 10000
}

source {
  Http {
    url = "https://api.open-meteo.com/v1/forecast?latitude=39.9042&longitude=116.4074&hourly=temperature_2m,relative_humidity_2m,precipitation,weather_code&timezone=Asia%2FShanghai&forecast_days=1"
    method = "GET"
    format = "json"
    json_field = {
      time = "$.hourly.time[*]"
      temperature_2m = "$.hourly.temperature_2m[*]"
      humidity = "$.hourly.relative_humidity_2m[*]"
      precipitation = "$.hourly.precipitation[*]"
      weather_code = "$.hourly.weather_code[*]"
    }
    schema = {
      fields {
        time = string
        temperature_2m = double
        humidity = int
        precipitation = double
        weather_code = int
      }
    }
  }
}

transform {
  Sql {
    source_table_name = "Http_source_table"
    result_table_name = "enriched"
    query = """
      SELECT *, 'open_meteo' AS source_system, NOW() AS _ingested_at
      FROM Http_source_table
    """
  }
}

sink {
  Jdbc {
    url = "jdbc:postgresql://postgres:5432/data_warehouse"
    driver = "org.postgresql.Driver"
    user = "dw_admin"
    password = "dw_secure_pwd_2025"
    database = "data_warehouse"
    table = "ods.weather_forecast"
    schema_save_mode = "CREATE_TABLE_WHEN_NOT_EXIST"
    data_save_mode = "APPEND"
  }
}
