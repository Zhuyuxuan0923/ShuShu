env {
  parallelism = 1
  job.mode = "BATCH"
  checkpoint.interval = 10000
}

source {
  Http {
    url = "https://api.github.com/events"
    method = "GET"
    format = "json"
    headers = {
      Accept = "application/vnd.github+json"
      User-Agent = "DataWarehouse-Platform/1.0"
    }
    json_field = {
      id = "$.[*].id"
      type = "$.[*].type"
      actor_login = "$.[*].actor.login"
      actor_id = "$.[*].actor.id"
      repo_name = "$.[*].repo.name"
      repo_id = "$.[*].repo.id"
      created_at = "$.[*].created_at"
      is_public = "$.[*].public"
    }
    schema = {
      fields {
        id = string
        type = string
        actor_login = string
        actor_id = bigint
        repo_name = string
        repo_id = bigint
        created_at = string
        is_public = boolean
      }
    }
  }
}

transform {
  Sql {
    source_table_name = "Http_source_table"
    result_table_name = "enriched"
    query = """
      SELECT *, 'github' AS source_system, NOW() AS _ingested_at
      FROM Http_source_table
    """
  }
}

sink {
  Jdbc {
    url = "jdbc:postgresql://postgres:5432/data_warehouse"
    driver = "org.postgresql.Driver"
    user = "dw_admin"
    password = "dw_secure_pwd_2025"
    database = "data_warehouse"
    table = "ods.github_events"
    schema_save_mode = "CREATE_TABLE_WHEN_NOT_EXIST"
    data_save_mode = "APPEND"
  }
}
