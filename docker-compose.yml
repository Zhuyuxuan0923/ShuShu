version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dw_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sh:/docker-entrypoint-initdb.d/init_postgres.sh
      - ./scripts/init_source_db.sh:/docker-entrypoint-initdb.d/init_source_db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dw_net

  seatunnel:
    build:
      context: .
      dockerfile: docker/Dockerfile.seatunnel
    container_name: dw_seatunnel
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5801:5801"
    command: /opt/seatunnel/bin/seatunnel-cluster.sh
    volumes:
      - ./seatunnel/config/seatunnel.yaml:/opt/seatunnel/config/seatunnel.yaml
      - ./seatunnel/jobs:/opt/seatunnel/jobs
      - seatunnel_data:/opt/seatunnel/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dw_net

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: dw_airflow_webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_AIRFLOW_DB}
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_AIRFLOW_DB}
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYliIUdQOWobqBuZzNplGc_Heqok3HlNSIs8w="
      AIRFLOW__WEBSERVER__SECRET_KEY: "a3f5b2c8d1e9f4a7b6c3d2e1f0a9b8c7"
      AIRFLOW__WEBSERVER__RBAC: "true"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DW_DB: ${POSTGRES_DW_DB}
      WECOM_WEBHOOK_URL: ${WECOM_WEBHOOK_URL}
      DINGTALK_WEBHOOK_URL: ${DINGTALK_WEBHOOK_URL}
      DBT_ENV: dev
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dbt:/opt/dbt
      - ./docs:/opt/docs
    command: bash -c "bash /tmp/install_dbt.sh && airflow webserver"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dw_net

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: dw_airflow_scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_AIRFLOW_DB}
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_AIRFLOW_DB}
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYliIUdQOWobqBuZzNplGc_Heqok3HlNSIs8w="
      AIRFLOW__WEBSERVER__SECRET_KEY: "a3f5b2c8d1e9f4a7b6c3d2e1f0a9b8c7"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DW_DB: ${POSTGRES_DW_DB}
      WECOM_WEBHOOK_URL: ${WECOM_WEBHOOK_URL}
      DINGTALK_WEBHOOK_URL: ${DINGTALK_WEBHOOK_URL}
      DBT_ENV: dev
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dbt:/opt/dbt
      - ./docs:/opt/docs
    command: bash -c "bash /tmp/install_dbt.sh && airflow scheduler"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dw_net

  airflow-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: dw_airflow_worker
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_AIRFLOW_DB}
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_AIRFLOW_DB}
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYliIUdQOWobqBuZzNplGc_Heqok3HlNSIs8w="
      AIRFLOW__WEBSERVER__SECRET_KEY: "a3f5b2c8d1e9f4a7b6c3d2e1f0a9b8c7"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DW_DB: ${POSTGRES_DW_DB}
      WECOM_WEBHOOK_URL: ${WECOM_WEBHOOK_URL}
      DINGTALK_WEBHOOK_URL: ${DINGTALK_WEBHOOK_URL}
      DBT_ENV: dev
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dbt:/opt/dbt
      - ./docs:/opt/docs
    command: bash -c "bash /tmp/install_dbt.sh && airflow celery worker"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dw_net

  redis:
    image: redis:7-alpine
    container_name: dw_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dw_net

  airflow-init:
    build:
      context: .
      dockerfile: docker/Dockerfile.airflow
    container_name: dw_airflow_init
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_AIRFLOW_DB}
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_AIRFLOW_DB}
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYliIUdQOWobqBuZzNplGc_Heqok3HlNSIs8w="
      AIRFLOW__WEBSERVER__SECRET_KEY: "a3f5b2c8d1e9f4a7b6c3d2e1f0a9b8c7"
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./dbt:/opt/dbt
      - ./docs:/opt/docs
    command: bash -c "bash /tmp/install_dbt.sh && airflow db migrate && airflow users create --username $${AIRFLOW_ADMIN_USER} --firstname Admin --lastname User --role Admin --email admin@example.com --password $${AIRFLOW_ADMIN_PASSWORD}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dw_net

volumes:
  postgres_data:
  seatunnel_data:

networks:
  dw_net:
    driver: bridge
