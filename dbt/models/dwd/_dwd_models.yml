version: 2

models:
  - name: dwd_github_events
    description: "Cleansed GitHub events with dedup, type normalization, and dimension splitting"
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: event_type
        tests:
          - not_null
          - accepted_values:
              values:
                - PushEvent
                - WatchEvent
                - PullRequestEvent
                - IssuesEvent
                - IssueCommentEvent
                - CreateEvent
                - DeleteEvent
                - ForkEvent
                - CommitCommentEvent
                - PublicEvent
                - GollumEvent
                - MemberEvent
                - ReleaseEvent
                - SponsorshipEvent
              severity: warn
      - name: event_date
        tests:
          - not_null
      - name: repo_owner
        tests:
          - not_null
      - name: repo_name_short
        tests:
          - not_null

  - name: dwd_weather_forecast
    description: "Cleansed weather forecast with standardized columns and dedup"
    columns:
      - name: forecast_time
        tests:
          - unique
          - not_null
      - name: temperature_2m
        tests:
          - not_null
      - name: weather_category
        tests:
          - not_null

  - name: dwd_ecommerce_products
    description: "Cleansed e-commerce products with rating tiers and dedup"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: product_title
        tests:
          - not_null
      - name: price
        tests:
          - not_null
      - name: rating_tier
        tests:
          - not_null
          - accepted_values:
              values: ['platinum', 'gold', 'silver', 'bronze']

  - name: dwd_business_customers
    description: "Cleansed customer master data with dedup and normalization (name/email/city trimmed)"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: customer_name
        tests:
          - not_null
      - name: customer_type
        tests:
          - not_null
          - accepted_values:
              values: ['individual', 'corporate']

  - name: dwd_business_orders
    description: "Cleansed orders with status normalization, payment channel mapping, and dedup"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'processing', 'cancelled', 'refunded']
      - name: total_amount
        tests:
          - not_null
      - name: order_date_key
        tests:
          - not_null

  - name: dwd_business_order_items
    description: "Cleansed order items with line_total calculation and dedup"
    columns:
      - name: item_id
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: product_name
        tests:
          - not_null
      - name: quantity
        tests:
          - not_null
      - name: line_total
        tests:
          - not_null
