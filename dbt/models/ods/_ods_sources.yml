version: 2

sources:
  - name: external_apis
    database: data_warehouse
    schema: ods
    description: "Raw data ingested from external APIs via Apache SeaTunnel"
    tables:
      - name: github_events
        identifier: github_events
        description: "GitHub public events (last 30 events from api.github.com/events)"
        freshness:
          warn_after: {count: 6, period: hour}
          error_after: {count: 12, period: hour}
        loaded_at_field: _ingested_at
        columns:
          - name: id
            tests:
              - not_null
              - unique
          - name: type
            tests:
              - not_null
          - name: created_at
            tests:
              - not_null
          - name: repo_name
            tests:
              - not_null

      - name: weather_forecast
        identifier: weather_forecast
        description: "Hourly weather forecast from Open-Meteo API (Beijing, 1 day)"
        freshness:
          warn_after: {count: 2, period: hour}
          error_after: {count: 4, period: hour}
        loaded_at_field: _ingested_at
        columns:
          - name: time
            tests:
              - not_null
          - name: temperature_2m
            tests:
              - not_null

      - name: ecommerce_products
        identifier: ecommerce_products
        description: "E-commerce product catalog from DummyJSON API"
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: _ingested_at
        columns:
          - name: id
            tests:
              - not_null
              - unique
          - name: title
            tests:
              - not_null
          - name: price
            tests:
              - not_null

      - name: business_customers
        identifier: business_customers
        description: "Customer master data from source_db (JDBC ingestion)"
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: _ingested_at
        columns:
          - name: customer_id
            tests:
              - not_null
              - unique
          - name: customer_name
            tests:
              - not_null

      - name: business_orders
        identifier: business_orders
        description: "Order transaction data from source_db (JDBC ingestion)"
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: _ingested_at
        columns:
          - name: order_id
            tests:
              - not_null
              - unique
          - name: order_date
            tests:
              - not_null
          - name: total_amount
            tests:
              - not_null

      - name: business_order_items
        identifier: business_order_items
        description: "Order line items from source_db (JDBC ingestion)"
        freshness:
          warn_after: {count: 24, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: _ingested_at
        columns:
          - name: item_id
            tests:
              - not_null
              - unique
          - name: order_id
            tests:
              - not_null
